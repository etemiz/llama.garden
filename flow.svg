<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 860" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bc4c00"/>
    </marker>
    <marker id="arre" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8957e5"/>
    </marker>
    <marker id="arrw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a7f37"/>
    </marker>
    <marker id="arra" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0969da"/>
    </marker>
    <style>
      .b   { stroke-width:1.1; }
      .hf  { fill:#fff8e1; stroke:#b08800; }
      .py  { fill:#eff8ff; stroke:#0969da; }
      .to  { fill:#fff4ec; stroke:#bc4c00; }
      .no  { fill:#faf5ff; stroke:#8957e5; }
      .pu  { fill:#ecfdf5; stroke:#1a7f37; }
      .us  { fill:#fff5f5; stroke:#cf222e; }
      .api { fill:#f6f8fa; stroke:#656d76; }
      .l   { font-weight:700; font-size:9px; fill:#1f2328; }
      .s   { fill:#656d76; font-size:7px; }
      .xs  { fill:#656d76; font-size:6.5px; }
      .n   { font-size:7px; fill:#fff; font-weight:700; }
      .f   { stroke:#444; stroke-width:1.2; fill:none; }
      .ft  { stroke:#bc4c00; stroke-width:1.2; fill:none; }
      .fe  { stroke:#8957e5; stroke-width:1.2; fill:none; }
      .fw  { stroke:#1a7f37; stroke-width:1.2; fill:none; stroke-dasharray:3 2; }
      .fa  { stroke:#0969da; stroke-width:1.2; fill:none; stroke-dasharray:3 2; }
    </style>
  </defs>

  <!-- title -->
  <text x="500" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2328">llama.garden — decentralized LLM sharing flow</text>

  <!-- 1 HuggingFace -->
  <g>
    <rect class="b hf" x="380" y="34" width="200" height="48" rx="6"/>
    <circle cx="392" cy="46" r="6" fill="#b08800"/><text x="392" y="49" text-anchor="middle" class="n">1</text>
    <text x="480" y="54" text-anchor="middle" class="l">HuggingFace</text>
    <text x="480" y="66" text-anchor="middle" class="s">model files + CDN webseeds</text>
  </g>

  <!-- 1.5 waifu source -->
  <g>
    <rect class="b us" x="780" y="34" width="180" height="48" rx="6"/>
    <circle cx="792" cy="46" r="6" fill="#cf222e"/><text x="792" y="49" text-anchor="middle" class="n">7</text>
    <text x="870" y="54" text-anchor="middle" class="l">waifu-magnet-NN.html</text>
    <text x="870" y="66" text-anchor="middle" class="s">single-file viewer source</text>
  </g>

  <!-- 2 url-to-torr-stream.py -->
  <g>
    <rect class="b py" x="60" y="110" width="230" height="58" rx="6"/>
    <circle cx="72" cy="122" r="6" fill="#0969da"/><text x="72" y="125" text-anchor="middle" class="n">2a</text>
    <text x="175" y="130" text-anchor="middle" class="l">url-to-torr-stream.py</text>
    <text x="175" y="142" text-anchor="middle" class="s">stream files, hash pieces</text>
    <text x="175" y="152" text-anchor="middle" class="s">HF URL → .torrent + magnet</text>
  </g>
  <line class="f" x1="420" y1="82" x2="240" y2="110" marker-end="url(#arr)"/>
  <text x="315" y="92" class="xs">HF URL</text>

  <!-- 2 cache -->
  <g>
    <rect class="b hf" x="340" y="110" width="150" height="58" rx="6"/>
    <circle cx="352" cy="122" r="6" fill="#b08800"/><text x="352" y="125" text-anchor="middle" class="n">2b</text>
    <text x="415" y="130" text-anchor="middle" class="l">HF cache</text>
    <text x="415" y="142" text-anchor="middle" class="s">~/.cache/huggingface/</text>
    <text x="415" y="152" text-anchor="middle" class="s">snapshots/&lt;sha&gt;/</text>
  </g>
  <line class="f" x1="480" y1="82" x2="440" y2="110" marker-end="url(#arr)"/>

  <!-- 2 cache-to-torr-nostr.py -->
  <g>
    <rect class="b py" x="540" y="105" width="240" height="68" rx="6"/>
    <circle cx="552" cy="117" r="6" fill="#0969da"/><text x="552" y="120" text-anchor="middle" class="n">3</text>
    <text x="660" y="125" text-anchor="middle" class="l">cache-to-torr-nostr.py</text>
    <text x="552" y="139" class="s">• classify model, hash + verify</text>
    <text x="552" y="149" class="s">• build .torrent (HF webseeds)</text>
    <text x="552" y="159" class="s">• PoW + sign kind 30099</text>
  </g>
  <line class="f" x1="490" y1="139" x2="540" y2="139" marker-end="url(#arr)"/>
  <text x="500" y="132" class="xs">cached files</text>

  <!-- publish-waifu-magnet.py -->
  <g>
    <rect class="b py" x="770" y="110" width="210" height="58" rx="6"/>
    <circle cx="782" cy="122" r="6" fill="#0969da"/><text x="782" y="125" text-anchor="middle" class="n">8</text>
    <text x="875" y="130" text-anchor="middle" class="l">publish-waifu-magnet.py</text>
    <text x="875" y="142" text-anchor="middle" class="s">Blossom upload + kind 30100</text>
    <text x="875" y="152" text-anchor="middle" class="s">self-update announcement</text>
  </g>
  <line class="f" x1="870" y1="82" x2="875" y2="110" marker-end="url(#arr)"/>

  <!-- .torrent -->
  <g>
    <rect class="b to" x="110" y="210" width="130" height="40" rx="6"/>
    <text x="175" y="228" text-anchor="middle" class="l">.torrent</text>
    <text x="175" y="239" text-anchor="middle" class="s">BT v1 + webseeds</text>
  </g>
  <line class="f" x1="175" y1="168" x2="175" y2="207" marker-end="url(#arr)"/>
  <text x="183" y="188" class="xs">build</text>
  <line class="f" x1="610" y1="173" x2="240" y2="210" marker-end="url(#arr)"/>
  <text x="405" y="185" class="xs">build</text>

  <!-- kind 30099 -->
  <g>
    <rect class="b no" x="580" y="210" width="150" height="40" rx="6"/>
    <text x="655" y="228" text-anchor="middle" class="l">kind 30099</text>
    <text x="655" y="239" text-anchor="middle" class="s">torrent listing</text>
  </g>
  <line class="fe" x1="660" y1="173" x2="655" y2="207" marker-end="url(#arre)"/>
  <text x="668" y="188" class="xs">event</text>

  <!-- kind 30100 -->
  <g>
    <rect class="b no" x="820" y="210" width="140" height="40" rx="6"/>
    <text x="890" y="228" text-anchor="middle" class="l">kind 30100</text>
    <text x="890" y="239" text-anchor="middle" class="s">viewer release</text>
  </g>
  <line class="fe" x1="875" y1="168" x2="890" y2="207" marker-end="url(#arre)"/>
  <text x="895" y="188" class="xs">event</text>

  <!-- Blossom -->
  <g>
    <rect class="b to" x="80" y="285" width="160" height="55" rx="6"/>
    <circle cx="92" cy="297" r="6" fill="#bc4c00"/><text x="92" y="300" text-anchor="middle" class="n">4</text>
    <text x="160" y="308" text-anchor="middle" class="l">Blossom (BUD-02)</text>
    <text x="160" y="320" text-anchor="middle" class="s">.torrent / HTML blobs</text>
    <text x="160" y="330" text-anchor="middle" class="s">sha256 + expiry auth</text>
  </g>
  <line class="ft" x1="175" y1="250" x2="160" y2="282" marker-end="url(#arrt)"/>
  <text x="152" y="268" class="xs">upload</text>
  <polyline class="ft" points="820,168 240,168 160,285" fill="none" marker-end="url(#arrt)"/>
  <text x="340" y="164" class="xs">upload HTML</text>

  <!-- Nostr relays -->
  <g>
    <rect class="b no" x="540" y="285" width="220" height="55" rx="6"/>
    <circle cx="552" cy="297" r="6" fill="#8957e5"/><text x="552" y="300" text-anchor="middle" class="n">5</text>
    <text x="650" y="308" text-anchor="middle" class="l">Nostr relays</text>
    <text x="650" y="320" text-anchor="middle" class="s">30099 · 30100 · 30102</text>
    <text x="650" y="330" text-anchor="middle" class="s">30103 · 1985 labels</text>
  </g>
  <line class="fe" x1="655" y1="250" x2="650" y2="282" marker-end="url(#arre)"/>
  <text x="665" y="268" class="xs">fan-out</text>
  <line class="fe" x1="890" y1="250" x2="760" y2="285" marker-end="url(#arre)"/>
  <text x="800" y="268" class="xs">fan-out</text>

  <!-- waifu-magnet viewer -->
  <g>
    <rect class="b us" x="60" y="380" width="220" height="95" rx="6"/>
    <circle cx="72" cy="392" r="6" fill="#cf222e"/><text x="72" y="395" text-anchor="middle" class="n">6</text>
    <text x="170" y="403" text-anchor="middle" class="l">waifu-magnet-NN.html</text>
    <text x="72" y="418" class="s">• WS subscribe to relays</text>
    <text x="72" y="428" class="s">• verify Schnorr client-side</text>
    <text x="72" y="438" class="s">• fetch + hash-check .torrent</text>
    <text x="72" y="448" class="s">• poll api.llama.garden</text>
    <text x="72" y="458" class="s">• render cards + self-update</text>
  </g>
  <line class="fe" x1="540" y1="340" x2="280" y2="380" marker-end="url(#arre)"/>
  <text x="475" y="348" class="xs">events</text>
  <line class="ft" x1="160" y1="340" x2="170" y2="377" marker-end="url(#arrt)"/>
  <text x="120" y="365" class="xs">.torrent / HTML</text>

  <!-- fan-out.py -->
  <g>
    <rect class="b py" x="360" y="430" width="110" height="45" rx="6"/>
    <text x="415" y="450" text-anchor="middle" class="l">fan-out.py</text>
    <text x="415" y="460" text-anchor="middle" class="s">add to all pumps</text>
  </g>
  <line class="f" x1="240" y1="250" x2="415" y2="427" marker-end="url(#arr)"/>
  <text x="300" y="330" class="xs">operator</text>

  <!-- pump fleet -->
  <g>
    <rect class="b pu" x="540" y="380" width="240" height="95" rx="6"/>
    <circle cx="552" cy="392" r="6" fill="#1a7f37"/><text x="552" y="395" text-anchor="middle" class="n">9</text>
    <text x="660" y="403" text-anchor="middle" class="l">pump fleet (Transmission)</text>
    <text x="552" y="418" class="s">• seeds model torrents</text>
    <text x="552" y="428" class="s">• peers upload / download</text>
    <text x="552" y="438" class="s">• read from pumps.txt</text>
    <text x="552" y="448" class="s">webseed fallback to HF</text>
  </g>
  <line class="f" x1="470" y1="453" x2="540" y2="428" marker-end="url(#arr)"/>
  <text x="490" y="445" class="xs">.torrent</text>

  <!-- kickout.py -->
  <g>
    <rect class="b py" x="560" y="510" width="200" height="40" rx="6"/>
    <text x="660" y="528" text-anchor="middle" class="l">kickout.py</text>
    <text x="660" y="539" text-anchor="middle" class="s">disk guard (free &lt; reserve)</text>
  </g>
  <line class="f" x1="660" y1="475" x2="660" y2="507" marker-end="url(#arr)"/>
  <text x="667" y="493" class="xs">evict</text>

  <!-- report.py -->
  <g>
    <rect class="b py" x="820" y="415" width="130" height="40" rx="6"/>
    <text x="885" y="433" text-anchor="middle" class="l">report.py</text>
    <text x="885" y="444" text-anchor="middle" class="s">health report</text>
  </g>
  <line class="f" x1="780" y1="428" x2="820" y2="428" marker-end="url(#arr)"/>
  <text x="793" y="423" class="xs">poll</text>

  <!-- pumps.lmdb -->
  <g>
    <rect class="b api" x="820" y="485" width="130" height="40" rx="6"/>
    <text x="885" y="503" text-anchor="middle" class="l">pumps.lmdb</text>
    <text x="885" y="514" text-anchor="middle" class="s">infohash → pumps</text>
  </g>
  <line class="f" x1="885" y1="455" x2="885" y2="482" marker-end="url(#arr)"/>

  <!-- api.llama.garden -->
  <g>
    <rect class="b api" x="760" y="580" width="200" height="45" rx="6"/>
    <text x="860" y="598" text-anchor="middle" class="l">api.llama.garden/pumps</text>
    <text x="860" y="610" text-anchor="middle" class="s">seeder + percent_done per infohash</text>
  </g>
  <line class="f" x1="885" y1="525" x2="860" y2="577" marker-end="url(#arr)"/>
  <polyline class="fa" points="760,602 170,602 170,475" fill="none" marker-end="url(#arra)"/>
  <text x="410" y="596" class="xs">seeder / download counts</text>

  <!-- HF webseeds -->
  <g>
    <rect class="b hf" x="60" y="700" width="150" height="50" rx="6"/>
    <circle cx="72" cy="712" r="6" fill="#b08800"/><text x="72" y="715" text-anchor="middle" class="n">10</text>
    <text x="135" y="722" text-anchor="middle" class="l">HF webseeds</text>
    <text x="135" y="734" text-anchor="middle" class="s">HTTP Range fallback</text>
    <text x="135" y="744" text-anchor="middle" class="s">huggingface.co + mirror</text>
  </g>

  <!-- Users / BT clients -->
  <g>
    <rect class="b us" x="380" y="685" width="240" height="80" rx="6"/>
    <circle cx="392" cy="697" r="6" fill="#cf222e"/><text x="392" y="700" text-anchor="middle" class="n">11</text>
    <text x="500" y="708" text-anchor="middle" class="l">Users / BT clients</text>
    <text x="392" y="723" class="s">• magnet → BT client</text>
    <text x="392" y="733" class="s">• download from peers + HF</text>
    <text x="392" y="743" class="s">• optional: seed back</text>
  </g>
  <line class="f" x1="280" y1="475" x2="420" y2="685" marker-end="url(#arr)"/>
  <text x="320" y="575" class="xs">magnet</text>
  <line class="fw" x1="210" y1="725" x2="380" y2="725" marker-end="url(#arrw)"/>
  <text x="285" y="718" class="xs">HTTP</text>
  <line class="f" x1="660" y1="475" x2="550" y2="685" marker-end="url(#arr)"/>
  <text x="625" y="575" class="xs">BT peers</text>

  <!-- legend -->
  <g transform="translate(60,810)">
    <rect class="hf" x="0"   y="0" width="9" height="7"/><text x="13" y="6" class="xs">HF</text>
    <rect class="py" x="50"  y="0" width="9" height="7"/><text x="63" y="6" class="xs">script</text>
    <rect class="to" x="108" y="0" width="9" height="7"/><text x="121" y="6" class="xs">torrent/Blossom</text>
    <rect class="no" x="216" y="0" width="9" height="7"/><text x="229" y="6" class="xs">Nostr</text>
    <rect class="pu" x="276" y="0" width="9" height="7"/><text x="289" y="6" class="xs">pump</text>
    <rect class="us" x="328" y="0" width="9" height="7"/><text x="341" y="6" class="xs">viewer/user</text>
    <rect class="api" x="408" y="0" width="9" height="7"/><text x="421" y="6" class="xs">api/lmdb</text>
    <line class="ft" x1="488" y1="4" x2="510" y2="4"/><text x="514" y="6" class="xs">torrent/HTML</text>
    <line class="fe" x1="584" y1="4" x2="606" y2="4"/><text x="610" y="6" class="xs">event</text>
    <line class="fw" x1="652" y1="4" x2="674" y2="4"/><text x="678" y="6" class="xs">HTTP/BT peer</text>
    <line class="fa" x1="756" y1="4" x2="778" y2="4"/><text x="782" y="6" class="xs">API</text>
  </g>
</svg>
